<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konto tegemine</title>
  </head>
  <body>
    <div class="picture">
      <img src="/src/assets/MURG.jpg" height="1024" alt="pilt MURGi hoonest." />
    </div>
    <div class="title">
      <h1>Ruumibroneerimine</h1>
      <br />
    </div>
    <div class="info">
      <h2><p>Sinu lihtne ruumibroneerimise tarkvara lahendus</p></h2>
    </div>
    <div class="name">
      <p>Nimi</p>
      <input type="text" placeholder="Sinu nimi" />
    </div>
    <div class="email">
      <p>Meil</p>
      <input type="email" placeholder="Sinu email" />
    </div>
    <div class="password">
      <p>Parool</p>
      <input type="password" placeholder="Sinu parool" />
    </div>
    <div class="password">
      <p>Parool uuesti</p>
      <input type="password" placeholder="Sinu parool" />
    </div>
    <div class="button">
      <br />
      <button>Loo konto</button>
    </div>
    <div class="login">
      <p>On olemas konto?</p>
      <button>Logi sisse</button>
    </div>
  </body>
</html>
