<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parooli lähtestamine</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
  </head>
  <body>
    <div class="split">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="vorm">
          <header>
            <h1>Ruumibroneerimine</h1>
            <p>Saadame meili parooli lähtestamiseks</p>
          </header>
          <form id="resetForm">
            <label for="email">Meil</label>
            <input id="email" name="email" required type="email" placeholder="meil@hot.ee" />

            <a class="reset-pass" href="/login/">
              Parool tuli meelde? Logi sisse
            </a>

            <br />
            <button class="btn btn-primary" type="submit">
              Saada paroolivahetuse meil
            </button>

            <!-- Teated -->
            <p id="message" style="color: rgb(3, 96, 3); margin-top: 10px;"></p>
            <p id="error" style="color: rgb(129, 0, 0);"></p>
          </form>
        </div>
        <div class="registreeru">
          <p>Pole veel kontot?</p>
          <a href="/signup/" class="btn btn-primary">Registreeru</a>
        </div>
      </main>
    </div>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/reset-password.js"></script>
  </body>
</html>
