<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parooli lähtestamine</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
  </head>
  <body>
    <div class="split">
      <div class="pilt">
        <img
          src="/assets/MURG.avif"
          alt="MURG hoone vaade"
          fetchpriority="high"
        />
      </div>
      <main role="main" aria-labelledby="reset-title">
        <div class="vorm">
          <header>
            <h1 id="reset-title">Ruumibroneerimine</h1>
            <p>Saadame meili parooli lähtestamiseks</p>
          </header>
          <form id="resetForm" aria-label="Parooli lähtestamise vorm">
            <label for="email">Meil</label>
            <input
              id="email"
              name="email"
              required
              type="email"
              placeholder="meil@hot.ee"
              autocomplete="email"
              aria-required="true"
            />

            <a class="reset-pass" href="/login/">
              Parool tuli meelde? Logi sisse
            </a>

            <br />
            <button class="btn btn-primary" type="submit">
              Saada paroolivahetuse meil
            </button>

            <p id="message" role="status" aria-live="polite"></p>
            <p id="error" role="alert" aria-live="assertive"></p>
          </form>
        </div>
        <div class="registreeru">
          <p>Pole veel kontot?</p>
          <a href="/signup/" class="btn btn-primary">Registreeru</a>
        </div>
      </main>
    </div>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/reset-password.js"></script>
  </body>
</html>
