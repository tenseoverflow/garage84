<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parooli lähtestamine</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body>
    <div class="split">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="vorm">
          <header>
            <h1>Ruumibroneerimine</h1>
            <p>Saadame meili parooli lähtestamiseks</p>
          </header>
          <form action="GET">
            <label for="email">Meil</label>
            <input id="email" required type="email" placeholder="meil@hot.ee" />
            <a class="reset-pass" href="/login"
              >Parool tuli meelde? Logi sisse</a
            >
            <br />
            <button class="btn btn-primary">Saada paroolivahetuse meil</button>
          </form>
        </div>
        <div class="registreeru">
          <p>Pole veel kontot?</p>
          <a href="/signup/" class="btn btn-primary">Registreeru</a>
        </div>
      </main>
    </div>
  </body>
</html>
