<!doctype html>

<html lang="et">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loo uus ruum</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <app-navbar></app-navbar>
    <main>
      <div class="vorm new-room">
        <header>
          <h1>Loo uus ruum</h1>
        </header>

        <form action="/booking/" method="post" enctype="multipart/form-data">
          <label for="room-name">Toa nimi</label>
          <input id="room-name" name="name" required type="text" />

          <label for="room-location">Toa asukoht</label>
          <input id="room-location" name="location" required type="text" />

          <label for="room-image">Toa pilt</label>
          <input
            id="room-image"
            name="image"
            type="file"
            accept="image/*"
            style="position: absolute; left: -9999px"
          />
          <label
            for="room-image"
            class="btn btn-small btn-primary"
            id="room-image-label"
            >Lisa pilt</label
          >
          <span
            class="file-name"
            id="room-image-name"
            aria-hidden="true"
            style="
              margin-left: 0.6rem;
              color: var(--complimentary);
              font-size: 0.95rem;
            "
          ></span>

          <label for="room-image">Toa excel</label>
          <input
            id="room-image"
            name="image"
            type="file"
            accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
            style="position: absolute; left: -9999px"
          />
          <label
            for="room-image"
            class="btn btn-small btn-primary"
            id="room-image-label"
            >Lisa exceli tabel</label
          >
          <span
            class="file-name"
            id="room-image-name"
            aria-hidden="true"
            style="
              margin-left: 0.6rem;
              color: var(--complimentary);
              font-size: 0.95rem;
            "
          ></span>

          <button type="submit" class="btn btn-success">Loo ruum</button>
        </form>
      </div>
    </main>

    <script>
      // Update visible filename when a file is chosen
      (function () {
        var input = document.getElementById("room-image");
        var nameSpan = document.getElementById("room-image-name");
        if (!input) return;
        input.addEventListener("change", function () {
          var f = input.files && input.files[0];
          nameSpan.textContent = f ? f.name : "";
        });
      })();
    </script>
  </body>
</html>
