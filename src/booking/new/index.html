<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broneeringu vaade</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
  </head>
  <body class="with-navbar">
    <app-navbar title="Broneeringu vaade"></app-navbar>
    <div class="split split-nav">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <header>
          <h1 id="room-title">Laadimine...</h1>
          <p id="room-location">-</p>
        </header>
        <form action="" class="new-booking">
          <fieldset>
            <label for="booking-name">Nimi</label>
            <input id="booking-name" type="text" required />

            <label for="booking-description">Kirjeldus (valikuline)</label>
            <textarea id="booking-description" rows="3"></textarea>

            <label for="booking-date">Alguskuupäev</label>
            <input id="booking-date" type="date" required />

            <label for="booking-start-time">Algusaeg</label>
            <input id="booking-start-time" type="time" required />

            <label for="booking-end-date">Lõppkuupäev</label>
            <input id="booking-end-date" type="date" required />

            <label for="booking-end-time">Lõppaeg</label>
            <input id="booking-end-time" type="time" required />
          </fieldset>

          <div
            id="validation-errors"
            style="color: red; margin-top: 1rem"
          ></div>

          <p>
            <span id="summary-text">
              Kellast <strong id="summary-start">-</strong> kuupäeval
              <strong id="summary-date">-</strong> kuni
              <strong id="summary-end">-</strong> kuupäeval
              <strong id="summary-end-date-section">-</strong>.
            </span>
          </p>

          <!-- Calendar Component -->
          <div class="calendar">
            <div class="calendar-header">
              <button class="cal-button" id="prev-day">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M15 18L9 12L15 6"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <h2 id="calendar-title">Täna</h2>
              <button class="cal-button" id="next-day">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M9 18L15 12L9 6"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
            <div class="cal-grid">
              <ul class="cal-times" id="cal-times"></ul>
              <ul class="cal-desc" id="cal-desc"></ul>
            </div>
          </div>

          <!-- Decision -->
          <footer style="justify-content: center">
            <button type="submit" id="submit-btn" class="btn btn-success">
              Broneeri
            </button>
          </footer>
        </form>
      </main>
    </div>

    <script type="module" src="/js/booking/booking-creation.js"></script>
    <script type="module">
      import { initCalendar } from "/js/components/calendar.js";
      initCalendar();
    </script>
  </body>
</html>
