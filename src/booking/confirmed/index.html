<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruumibroneerimise login</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/components/status-message.js"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/components/confetti.js"></script>
    <style>
      canvas {
        overflow-y: hidden;
        overflow-x: hidden;
        width: 100%;
        margin: 0;
        position: absolute;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="with-navbar">
    <app-navbar></app-navbar>
    <canvas id="canvas" style="z-index: 100"></canvas>
    <div class="split split-nav">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="confirmation-message">
          <h1>Teie broneering on kinnitatud!</h1>
          <a
            id="view-booking-link"
            href="/booking/view/"
            class="btn btn-primary"
          >
            Vaata broneeringut
          </a>
        </div>
      </main>
    </div>
    <script type="module">
      // Get booking ID from URL and update the view link
      const urlParams = new URLSearchParams(window.location.search);
      const bookingId = urlParams.get("id");
      if (bookingId) {
        const viewLink = document.getElementById("view-booking-link");
        if (viewLink) {
          viewLink.href = `/booking/view/?id=${bookingId}`;
        }
      }
    </script>
  </body>
</html>
