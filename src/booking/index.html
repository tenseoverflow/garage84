<!doctype html>
<html lang="en">
  <head>
    <title>Ruumibroneerimine</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/components/room-card.js"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
  </head>
  <body class="with-navbar">
    <!-- Navbar -->
    <app-navbar></app-navbar>
    <!-- My bookings -->
    <a
      class="mobile-qr-button btn btn-small btn-primary"
      href="/qr/"
      style="margin-top: 20px"
    >
      Skaneeri QR kood</a
    >
    <div class="my_bookings">
      <h1>Minu broneeringud</h1>
      <div class="rooms-grid">
        <!-- User bookings will be rendered here -->
      </div>
    </div>
    <!-- New booking -->
    <div class="new_booking">
      <div class="booking-header">
        <h1>Ruumid broneerimiseks</h1>
        <select class="floor-select">
          <option value="1_floor">1. korrus</option>
          <option value="2_floor">2. korrus</option>
          <option value="3_floor">3. korrus</option>
        </select>
      </div>
      <div class="rooms-grid">
        <!-- Rooms will be rendered here -->
      </div>
    </div>
    <script>
      if (!/Android|iPhone|iPad|iPod/.test(navigator.userAgent)) {
        document.querySelector(".mobile-qr-button").style.display = "none";
      }
    </script>
    <script type="module" src="/js/booking/load-rooms.js"></script>
  </body>
</html>
