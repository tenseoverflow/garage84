<!doctype html>
<html lang="en">
  <head>
    <title>Ruumibroneerimine</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/components/room-card.js"></script>
  </head>
  <body>
    <!-- Navbar -->
    <app-navbar></app-navbar>
    <!-- My bookings -->
    <div class="my_bookings">
      <a class="mobile-qr-button btn btn-small btn-primary" href="/qr/"
        >Skaneeri QR kood</a
      >
      <h1>Minu broneeringud</h1>
      <div class="room-grid">
        <room-card
          title="Room #23"
          description="A luxurious meeting space for all meeting needs."
          img="/assets/MURG.jpg"
          status="booked"
          button-url="/booking/view/"
        ></room-card>
      </div>
    </div>
    <!-- New booking -->
    <div class="new_booking">
      <div class="booking-header">
        <h1>Ruumid broneerimiseks</h1>
        <select class="floor-select">
          <option value="1_floor">1. korrus</option>
          <option value="2_floor">2. korrus</option>
          <option value="3_floor">3. korrus</option>
        </select>
      </div>
      <div class="rooms-grid">
        <!-- Example available card -->
        <room-card
          title="Room #23"
          description="A luxurious meeting space for all meeting needs."
          img="/assets/MURG.jpg"
          status="available"
          button-url="/room/"
        ></room-card>
        <!-- Example not available card -->
        <room-card
          title="Room #23"
          description="A luxurious meeting space for all meeting needs."
          img="/assets/image-2.png"
          status="not-available"
          button-url="/room/"
        ></room-card>
      </div>
    </div>
  </body>
</html>
