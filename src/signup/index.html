<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konto tegemine</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-signup.js"></script>
  </head>
  <body>
    <div class="split">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="vorm">
          <header>
            <h1>Ruumibroneerimine</h1>
            <p>Sinu lihtne ruumibroneerimise tarkvara lahendus</p>
          </header>
          <form>
            <label for="name">Nimi</label>
            <input id="name" required type="text" placeholder="Sinu nimi" />
            <label for="email">Meil</label>
            <input id="email" required type="email" placeholder="meil@hot.ee" />
            <p id="emailError" class="error"></p>
            <label for="password">Parool</label>
            <div class="password-wrapper">
              <input id="password" required type="password" placeholder="Sinu parool" />
              <div class="togglePassword">
                <!-- Silm lahti -->
                <svg class="eye eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" 
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 
                      4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>

                <!-- Silm kinni -->
                <svg class="eye eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3l18 18M10.584 10.587A3 3 0 0113.413 13.41M9.88 4.238A9.953 
                      9.953 0 0112 4c4.477 0 8.268 2.943 9.542 7-.52 1.654-1.458 
                      3.13-2.688 4.27M6.12 6.12A9.953 9.953 0 002 12c.832 2.65 
                      2.704 4.89 5.12 6.12"/>
                </svg>
              </div>
            </div>
            <p id="passwordError" class="error"></p>
            <label for="password-again">Parool uuesti</label>
            <div class="password-wrapper">
              <input id="password-again" required type="password" placeholder="Sinu parool uuesti" />
              <div class="togglePassword">
                <!-- Silm lahti -->
                <svg class="eye eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" 
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 
                      9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  <circle cx="12" cy="12" r="3" stroke-width="2" />
                </svg>

                <!-- Silm kinni -->
                <svg class="eye eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3l18 18M10.584 10.587A3 3 0 0113.413 13.41M9.88 4.238A9.953 
                      9.953 0 0112 4c4.477 0 8.268 2.943 9.542 7-.52 1.654-1.458 
                      3.13-2.688 4.27M6.12 6.12A9.953 9.953 0 002 12c.832 2.65 
                      2.704 4.89 5.12 6.12"/>
                </svg>
              </div>
            </div>
            <p id="passwordAgainError" class="error"></p>
            <br />
            <button
              type="submit"
              class="btn btn-primary"
              id="signupBtn"
              disabled
            >
              Loo konto
            </button>
          </form>
        </div>
        <div class="registreeru">
          <p>On olemas konto?</p>
          <a href="/login/" class="btn btn-primary">Logi sisse</a>
        </div>
      </main>
    </div>
  </body>
</html>
