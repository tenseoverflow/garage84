<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konto tegemine</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-signup.js"></script>
  </head>
  <body>
    <div class="split">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="vorm">
          <header>
            <h1>Ruumibroneerimine</h1>
            <p>Sinu lihtne ruumibroneerimise tarkvara lahendus</p>
          </header>
          <form>
            <label for="name">Nimi</label>
            <input id="name" required type="text" placeholder="Sinu nimi" />
            <label for="email">Meil</label>
            <input id="email" required type="email" placeholder="meil@hot.ee" />
            <p id="emailError" class="error"></p>
            <label for="password">Parool</label>
            <input
              id="password"
              required
              type="password"
              placeholder="Sinu parool"
            />
            <p id="passwordError" class="error"></p>
            <label for="password-again">Parool uuesti</label>
            <input
              id="password-again"
              required
              type="password"
              placeholder="Sinu parool uuesti"
            />
            <p id="passwordAgainError" class="error"></p>
            <a class="reset-pass" href="/reset-password/">Unustasin parooli</a>
            <br />
            <button type="submit" class="btn btn-primary" id="signupBtn" disabled>Loo konto</button>
          </form>
        </div>
        <div class="registreeru">
          <p>On olemas konto?</p>
          <a href="/login/" class="btn btn-primary">Logi sisse</a>
        </div>
      </main>
    </div>
  </body>
</html>
