<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broneeringu vaade</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/components/calendar.js"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/room/room.js"></script>
  </head>
  <body class="with-navbar">
    <app-navbar title="Ruum"></app-navbar>
    <div class="split split-nav">
      <div class="pilt">
        <img
          id="room-image"
          src="/assets/MURG.avif"
          alt="Ruumi pilt"
          fetchpriority="high"
        />
      </div>
      <main>
        <header>
          <h1 id="room-title">Ruum</h1>
          <p id="room-location">Asukoht</p>
          <p id="room-capacity">Mahutavus</p>
        </header>
        <app-calendar id="room-calendar"></app-calendar>
        <footer>
          <a href="/room/change/" class="btn btn-primary">Muuda ruumi</a>
          <button
            id="download-qr"
            class="btn btn-secondary"
            style="cursor: pointer"
          >
            Lae alla QR kood
          </button>
          <a href="/booking/new/" class="btn btn-success">Lisa broneering</a>
        </footer>
        <p style="margin-top: 1rem; text-align: center">
          <a href="/booking/recurring/" class="link-hollowed"
            >+ Lisa korduv sündmus (tunniplaan)</a
          >
        </p>
      </main>
    </div>
  </body>
</html>
