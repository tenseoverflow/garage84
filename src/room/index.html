<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broneeringu vaade</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/room/room.js"></script>
  </head>
  <body class="with-navbar">
    <app-navbar title="Ruum"></app-navbar>
    <div class="split split-nav">
      <div class="pilt">
        <img id="room-image" src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <header>
          <h1 id="room-title">Ruum</h1>
          <p id="room-location">Asukoht</p>
          <p id="room-capacity">Mahutavus</p>
        </header>
        <!-- Kalendri komponent -->
        <div class="calendar">
          <div class="calendar-header">
            <button class="cal-button">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M15 18L9 12L15 6"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <h2>Juuni 2024</h2>
            <button class="cal-button">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M9 18L15 12L9 6"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div class="cal-grid">
            <ul class="cal-times">
              <li>8:30-9:40</li>
              <li>9:50-11:00</li>
              <li>11:00-11:30</li>
              <li>11:30-12:40</li>
              <li>12:40-13:30</li>
              <li>13:30-14:40</li>
              <li>14:50-16:00</li>
            </ul>
            <ul class="cal-desc">
              <li>Vaba</li>
              <li>Koosolek</li>
              <li>Lõuna</li>
              <li>Ajalugu G3 Pallas</li>
              <li>Matemaatika G2 Marss</li>
              <li>Keemia G1 Ceres</li>
              <li>Vaba</li>
            </ul>
          </div>
        </div>
        <!-- Decision -->
        <footer>
          <a href="/room/change/" class="link-hollowed">Muuda ruumi</a>
          <a href="/booking/new/" class="btn btn-success">Lisa broneering</a>
        </footer>
      </main>
    </div>
  </body>
</html>
