<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muuda tuba</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/components/navbar.js"></script>
  </head>
  <body class="with-navbar">
    <app-navbar title="Muuda tuba"></app-navbar>
    <div class="split split-nav">
      <div class="pilt">
        <img src="/assets/MURG.jpg" alt="pilt MURGi hoonest." />
      </div>
      <main>
        <div class="room-details">
          <form>
            <label for="room-name">Toa nimi</label>
            <input id="room-name" type="text" placeholder="Tuba #23" />

            <label for="room-location">Toa asukoht</label>
            <input id="room-location" type="text" placeholder="Korrus 3" />

            <label for="room-image">Toa pilt</label>
            <button type="button" class="btn btn-primary">Lae üles pilt</button>

            <label for="room-schedule">Toa tunniplaan</label>
            <button type="button" class="btn btn-primary">
              Lae üles excel
            </button>
          </form>
        </div>
        <div class="delete-save-buttons">
          <button class="btn btn-danger">Kustuta tuba #23</button>
          <button class="btn btn-success">Salvesta andmed</button>
        </div>
      </main>
    </div>
  </body>
</html>
